name: Multi-Stage Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:

  # 🔹 JOB 1: Setup & Validation
  setup:
    name: Setup & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - name: Basic check
        run: echo "Code checkout and environment ready"


  # 🔹 JOB 2: Build Docker Image & Save Artifact
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest .

      - name: Save Docker image as tar
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest | gzip > fastapi-app.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: fastapi-app.tar.gz


  # 🔹 JOB 3: Load & Push to Docker Hub
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Load Docker image
        run: |
          gunzip -c fastapi-app.tar.gz | docker load

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest