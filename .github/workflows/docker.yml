name: Multi-Stage Docker CI/CD with Compose

on:
  push:
    branches: ["main"]

jobs:

  # 🔹 JOB 1: Setup & Validation
  setup:
    name: Setup & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker & Compose
        run: |
          docker --version
          docker compose version

      - name: Basic check
        run: echo "Environment ready"


  # 🔹 JOB 2: Build Image using Docker Compose
  build-image:
    name: Build Image with Compose
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Pass Docker username to compose
      - name: Set Docker username
        run: echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> $GITHUB_ENV

      # ✅ Build image (uses image: from docker-compose.yml)
      - name: Build using docker compose
        run: docker compose build

      # ✅ Optional debug (VERY useful)
      - name: Show built images
        run: docker images

      # ✅ Save correct image
      - name: Save Docker image
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest | gzip > fastapi-app.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: fastapi-app.tar.gz


  # 🔹 JOB 3: Push Image to Docker Hub
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Load Docker image
        run: |
          gunzip -c fastapi-app.tar.gz | docker load

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Push correct image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest